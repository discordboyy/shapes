<!DOCTYPE html> 
<html lang="ru">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Граф фигур — карта геометрии</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0c10;
    --bg-soft: #11131a;
    --line: rgba(255,255,255,0.10);
    --line-strong: rgba(255,255,255,0.22);
    --node: #c9cad1;
    --node-dim: #6b6d78;
    --accent: #7b7fff;
    --accent-soft: rgba(123,127,255,0.18);
    --text: #e7e7ec;
    --text-dim: #8c8e98;
    --panel-bg: rgba(15,16,22,0.92);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    width:100%; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
  }

  #canvas-wrap{
    position:fixed; inset:0;
  }

  canvas{
    display:block;
    width:100%; height:100%;
  }

  /* Subtle radial vignette to focus the eye, echoes the dark Obsidian-style graph */
  #vignette{
    position:fixed; inset:0;
    pointer-events:none;
    background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
    z-index:5;
  }

  header{
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:28px 32px;
    z-index:10;
    pointer-events:none;
  }

  .brand{
    pointer-events:auto;
  }

  .brand .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent);
    display:block;
    margin-bottom:6px;
  }

  .brand h1{
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--text);
  }

  .brand p{
    margin-top:4px;
    font-size:13px;
    color:var(--text-dim);
    max-width:320px;
    line-height:1.5;
  }

  .legend{
    pointer-events:auto;
    text-align:right;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    line-height:1.8;
  }

  .legend .row{
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
  }

  .dot{
    width:8px; height:8px; border-radius:50%; display:inline-block;
  }

  footer{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:24px 32px;
    z-index:10;
    pointer-events:none;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.02em;
  }

  footer .hint{
    pointer-events:auto;
  }

  footer .count{
    pointer-events:auto;
    text-align:right;
  }

  /* Detail panel */
  #panel{
    position:fixed;
    top:0; right:0;
    height:100%;
    width:380px;
    max-width:88vw;
    background:var(--panel-bg);
    border-left:1px solid var(--line);
    backdrop-filter: blur(12px);
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    z-index:20;
    overflow-y:auto;
    padding:36px 32px 32px;
  }

  #panel.open{
    transform: translateX(0);
  }

  #panel .close-btn{
    position:absolute;
    top:24px; right:28px;
    width:32px; height:32px;
    border:1px solid var(--line);
    border-radius:50%;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    transition: border-color 0.2s, color 0.2s;
  }
  #panel .close-btn:hover{
    border-color:var(--accent);
    color:var(--text);
  }
  #panel .close-btn:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  #panel .shape-render{
    width:100%;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:24px;
  }

  #panel .shape-render svg{
    max-width:140px;
    max-height:140px;
  }

  #panel .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:10px;
    display:block;
  }

  #panel h2{
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.01em;
    margin-bottom:14px;
    line-height:1.15;
  }

  #panel .desc{
    font-size:14px;
    line-height:1.65;
    color:#c7c8d0;
    margin-bottom:24px;
  }

  .formula-block{
    border-top:1px solid var(--line);
    padding-top:16px;
    margin-bottom:16px;
  }

  .formula-block .label{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:6px;
    display:block;
  }

  .formula-block .formula{
    font-family:var(--mono);
    font-size:15px;
    color:var(--text);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 12px;
    display:inline-block;
  }

  .props-list{
    list-style:none;
    border-top:1px solid var(--line);
    padding-top:16px;
    margin-top:8px;
  }

  .props-list li{
    font-size:13px;
    color:var(--text-dim);
    line-height:1.6;
    padding-left:14px;
    position:relative;
    margin-bottom:6px;
  }

  .props-list li::before{
    content:'—';
    position:absolute; left:0;
    color:var(--accent);
  }

  .related-tag{
    display:inline-block;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    border:1px solid var(--line);
    border-radius:20px;
    padding:5px 12px;
    margin:4px 6px 0 0;
    cursor:pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .related-tag:hover{
    border-color:var(--accent);
    color:var(--text);
  }

  .related-wrap{
    border-top:1px solid var(--line);
    padding-top:16px;
    margin-top:8px;
  }

  @media (max-width: 640px){
    header, footer{ padding:18px 18px; }
    .legend{ display:none; }
    .brand p{ display:none; }
    #panel{ width:100%; max-width:100%; }
  }
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="graph"></canvas>
</div>
<div id="vignette"></div>

<header>
  <div class="brand">
    <span class="eyebrow">Карта геометрии</span>
    <h1>Граф фигур</h1>
    <p>Плоские фигуры как сеть связей. Перетаскивайте узлы, кликайте — чтобы увидеть свойства и формулы.</p>
  </div>
  <div class="legend">
    <div class="row"><span>Корень</span><span class="dot" style="background:#7b7fff"></span></div>
    <div class="row"><span>Категория</span><span class="dot" style="background:#c9cad1"></span></div>
    <div class="row"><span>Фигура</span><span class="dot" style="background:#6b6d78"></span></div>
    <button id="pause-btn"
      style="
        pointer-events:auto;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.15);
        color:#e7e7ec;
        padding:6px 10px;
        border-radius:8px;
        cursor:pointer;
        font-family:var(--mono);
        font-size:11px;
      ">
      ⏸ Pause
    </button>
  </div>
</header>

<footer>
  <div class="hint">Колесо мыши — масштаб · Перетаскивание фона — панорама</div>
  <div class="count" id="node-count"></div>
</footer>

<div id="panel">
  <button class="close-btn" id="close-panel" aria-label="Закрыть">✕</button>
  <div class="shape-render" id="shape-render"></div>
  <span class="eyebrow" id="panel-eyebrow">Фигура</span>
  <h2 id="panel-title">—</h2>
  <p class="desc" id="panel-desc"></p>

  <div class="formula-block" id="area-block" style="display:none;">
    <span class="label">Площадь</span>
    <div class="formula" id="area-formula"></div>
  </div>

  <div class="formula-block" id="perimeter-block" style="display:none;">
    <span class="label">Периметр</span>
    <div class="formula" id="perimeter-formula"></div>
  </div>

  <ul class="props-list" id="props-list"></ul>

  <div class="related-wrap" id="related-wrap" style="display:none;">
    <span class="label" style="font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);">Связанные фигуры</span>
    <div id="related-tags" style="margin-top:10px;"></div>
  </div>
</div>

<!-- <script src="i18n.js"></script> -->
<script src="data.js"></script>
<script src="graph.js"></script>
<!-- <script src="quiz-data.js"></script>
<script src="quiz.js"></script> -->
</body>
</html>
